<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#ff7a00;
    color:white;
    font-size:16px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
const firebaseConfig = {
  apiKey:  "AIzaSyBGA2EWzfYDmpf1LjI97a5sIexe0lOkxgs",
  authDomain: "shalenammapride-fb590.firebaseapp.com",
  projectId: "shalenammapride-fb590",
  storageBucket: "shalenammapride-fb590.appspot.com",
  messagingSenderId: "511780175950",
  appId: "1:511780175950:web:fa3d09184cbf6cb8f5831f",
  measurementId: "G-6VN8H9FZLL"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = async function () {

    const email = document.getElementById("email").value;

    const password = document.getElementById("password").value;

    try {

        await signInWithEmailAndPassword(auth, email, password);

        alert("Login Successful!");

        window.location.href = "index.html";

    }

    catch(error){

        alert(error.message);
    }
}

</script>

</body>
</html>
